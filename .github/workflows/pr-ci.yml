name: PR CI

on:
  push:
    branches: [main, feature/*, cursor/**]
  pull_request:
    branches: [main, cursor/**]
  workflow_dispatch:

jobs:
  test:
    name: Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install external tools and Python deps
        shell: bash -l {0}
        run: |
          conda install -y -c conda-forge fpocket freesasa apbs pdb2pqr pip
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest pytest-cov pytest-xdist flake8 bandit

      - name: Lint with flake8 (critical errors only)
        run: |
          flake8 cryptic_ip --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Cache validation structures
        uses: actions/cache@v4
        with:
          path: data/validation
          key: ci-validation-pdbs-v1

      - name: Download test structures
        run: |
          mkdir -p data/validation tests/data/structures
          for pdb in 1ZY7 1MAI; do
            if [ ! -f "data/validation/${pdb}.pdb" ]; then
              wget -q -O "data/validation/${pdb}.pdb" "https://files.rcsb.org/download/${pdb}.pdb"
            fi
            cp "data/validation/${pdb}.pdb" "tests/data/structures/${pdb}.pdb"
          done

      - name: Run validation CLI on example datasets
        run: |
          mkdir -p tests/data/validation
          python -c "import sqlite3; from pathlib import Path; Path('tests/data/validation/example.pdb').write_text('HEADER    EXAMPLE\nREMARK   2 RESOLUTION.    2.50 ANGSTROMS.\nATOM      1  N   ALA A   1      11.104  13.207  14.503  1.00 82.00           N\nATOM      2  CA  ALA A   1      11.551  11.823  14.240  1.00 82.00           C\nATOM      3  C   ALA A   1      12.001  11.089  15.505  1.00 82.00           C\nATOM      4  N   GLY A   2      13.104  10.207  16.503  1.00 80.00           N\nATOM      5  CA  GLY A   2      13.551   8.823  16.240  1.00 80.00           C\nTER\nEND\n'); Path('tests/data/validation/example_results.csv').write_text('pocket_id,pocket_depth,sasa,volume,composite_score\n1,4.2,320.5,210.0,0.82\n'); conn=sqlite3.connect('tests/data/validation/example.db'); conn.execute('CREATE TABLE structures (uniprot_id TEXT, model_date TEXT, file_path TEXT)'); conn.execute(\"INSERT INTO structures VALUES (NULL, '2024-01-01T00:00:00+00:00', 'tests/data/validation/example.pdb')\"); conn.commit(); conn.close()"
          cryptic-ip validate --structure tests/data/validation/example.pdb
          cryptic-ip validate --results tests/data/validation/example_results.csv
          cryptic-ip validate --database tests/data/validation/example.db
          cryptic-ip validate --all --structure tests/data/validation/example.pdb --results tests/data/validation/example_results.csv --database tests/data/validation/example.db

      - name: Run unit tests
        shell: bash -l {0}
        run: |
          pytest tests/ -v --cov=cryptic_ip --cov-report=term \
            -m "not requires_network and not slow" \
            --ignore=tests/integration

      - name: Run benchmark regression tests
        shell: bash -l {0}
        run: pytest tests/benchmarks -v

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.11'
          channels: conda-forge,bioconda,defaults

      - name: Install full environment
        shell: bash -l {0}
        run: |
          conda install -y -c conda-forge fpocket freesasa apbs pdb2pqr pip
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Cache validation structures
        uses: actions/cache@v4
        with:
          path: data/validation
          key: ci-validation-pdbs-v1

      - name: Download ADAR2 crystal structure
        run: |
          mkdir -p data/validation
          if [ ! -f data/validation/1ZY7.pdb ]; then
            wget -q -O data/validation/1ZY7.pdb https://files.rcsb.org/download/1ZY7.pdb
          fi

      - name: Run ADAR2 end-to-end test
        shell: bash -l {0}
        run: python scripts/phase1_validate_adar2.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r cryptic_ip/ -c .bandit -lll

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build twine

      - name: Build and check package
        run: |
          python -m build
          twine check dist/*
